loop_over:
- subject
- session
- run

T1w:
  plain_set: {}
  suffix_maps_to: "T1w"

lesion:
  plain_set:
    description: lesion
  suffix_maps_to: "mask"

wmparc:
  plain_set:
    description: wmparc
  suffix_maps_to: "mask"

aparc_aseg:
  plain_set:
    description: aparc+aseg
  suffix_maps_to: "mask"

dwi:
  plain_set: {}
  additional_extensions:
    - bvec
    - bval

dwi_ap:
  named_set:
    ap:
      direction: dir-AP
    pa:
      direction: dir-PA
  required: ["ap", "pa"]
  additional_extensions:
    - bvec
    - bval
  suffix_maps_to: "dwi"

dwi_rl:
  named_set:
    rl:
      direction: dir-RL
    lr:
      direction: dir-LR
  required: ["rl", "lr"]
  additional_extensions:
    - bvec
    - bval
  suffix_maps_to: "dwi"

dwi_is:
  named_set:
    is:
      direction: dir-IS
    si:
      direction: dir-SI
  required: ["is", "si"]
  additional_extensions:
    - bvec
    - bval
  suffix_maps_to: "dwi"

sbref:
  plain_set: {}

sbref_ap:
  named_set:
    ap:
      direction: dir-AP
    pa:
      direction: dir-PA
  required: ["ap", "pa"]
  suffix_maps_to: "sbref"

sbref_rl:
  named_set:
    rl:
      direction: dir-RL
    lr:
      direction: dir-LR
  required: ["rl", "lr"]
  suffix_maps_to: "sbref"

sbref_is:
  named_set:
    is:
      direction: dir-IS
    si:
      direction: dir-SI
  required: ["is", "si"]
  suffix_maps_to: "sbref"
