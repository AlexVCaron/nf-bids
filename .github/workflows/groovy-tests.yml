name: Groovy Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: groovy-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  groovy-tests:
    name: Run Groovy unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with libBIDS.sh submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run Groovy test suite
        run: ./gradlew --no-daemon test
