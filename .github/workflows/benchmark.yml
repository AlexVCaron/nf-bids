name: Benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run benchmark suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Nextflow
        uses: nf-core/setup-nextflow@v3
        with:
          version: '25.10.0'

      - name: Install Nextflow fallback for act
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          export NXF_VER=25.10.0
          mkdir -p "$HOME/.local/bin"
          curl -s https://get.nextflow.io | bash
          mv nextflow "$HOME/.local/bin/nextflow"
          chmod +x "$HOME/.local/bin/nextflow"
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v nextflow
          "$HOME/.local/bin/nextflow" -version

      - name: Verify Nextflow
        if: ${{ github.actor != 'nektos/act' }}
        run: |
          nextflow -version

      - name: Run benchmark suite
        working-directory: test/benchmark
        run: bash run_all_benchmarks.sh

      - name: Commit benchmark results
        if: ${{ github.actor != 'nektos/act' }}
        run: |
          if git diff --quiet -- test/benchmark/BENCHMARK_RESULTS.md documentation/modules/usage/pages/operators/performance.adoc; then
            echo "No benchmark/doc changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/benchmark/BENCHMARK_RESULTS.md documentation/modules/usage/pages/operators/performance.adoc
          git commit -m "Update benchmark results [skip ci]"
          git push

      - name: Local test mode summary (act)
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          echo "Running in local test mode via nektos/act."
          echo "Remote push/commit step intentionally skipped."
          git status --short